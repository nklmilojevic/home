---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vmetrics
  namespace: monitoring
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: victoriametrics
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    kubeControllerManager:
      enabled: true
      endpoints: []
      service:
        enabled: true
        port: 10257
        targetPort: 10257
        selector:
          component: kube-controller-manager
      vmScrape:
        spec:
          jobLabel: app.kubernetes.io/component
          namespaceSelector:
            matchNames:
              - kube-system
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true
                caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                serverName: kubernetes
    kubeScheduler:
      enabled: true
      endpoints: []
      service:
        enabled: true
        port: 10259
        targetPort: 10259
        selector:
          component: kube-scheduler
      vmScrape:
        spec:
          jobLabel: app.kubernetes.io/component
          namespaceSelector:
            matchNames: [kube-system]
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true
                caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt

    kubeEtcd:
      enabled: true
      # Talos runs etcd as a host service (no pod to select), exposing metrics on
      # http://0.0.0.0:2381 via the etcd listen-metrics-urls machine-config patch.
      # Scrape the control-plane node IPs over plain HTTP instead of the default
      # pod selector + https on 2379 (which discovers 0 targets on Talos).
      endpoints:
        - 10.40.0.201
        - 10.40.0.202
        - 10.40.0.203
      service:
        enabled: true
        port: 2381
        targetPort: 2381
      vmScrape:
        spec:
          jobLabel: app.kubernetes.io/component
          endpoints:
            - port: http-metrics
              scheme: http

    grafana:
      enabled: false

    victoria-metrics-operator:
      enabled: true
      operator:
        disable_prometheus_converter: false
        enable_converter_ownership: true

    serviceAccount:
      create: true
      annotations: {}

    ## -- Create default rules for monitoring the cluster
    defaultRules:
      # NOTE: this chart's toggle is `enabled`, not `create` (which is silently ignored).
      enabled: true

      # -- Runbook url prefix for default rules
      runbookUrl: https://runbooks.prometheus-operator.dev/runbooks

      # -- Labels for default rules
      labels: {}
      # -- Annotations for default rules
      annotations: {}

      # kube-scheduler.rules are histogram-quantile recordings that yield 0 samples
      # whenever the cluster is idle (no pod scheduling), repeatedly tripping
      # RecordingRulesNoData. They only feed the kube-scheduler Grafana dashboard.
      groups:
        kubeScheduler:
          enabled: false

    alertmanager:
      enabled: true
      annotations: {}
      # spec for VMAlertmanager crd
      # https://github.com/VictoriaMetrics/operator/blob/master/docs/api.MD#vmalertmanagerspec
      spec:
        selectAllByDefault: true
        externalURL: ""
        routePrefix: /
      ingress:
        enabled: false
      monzoTemplate:
        enabled: false

      templateFiles:
        telegram.tmpl: |-
          {{ define "alert_item" }}
          🪪 <b>{{ .Labels.alertname }}</b>
          {{- if eq .Labels.severity "critical" }}
          🚨 CRITICAL 🚨{{ end }}
          {{- if eq .Labels.severity "warning" }}
          ⚠️ WARNING ⚠️{{ end }}
          {{- if .Annotations.summary }}
          📝 {{ printf "%.200s" .Annotations.summary }}{{ end }}
          {{- if .Annotations.description }}
          📖 {{ printf "%.400s" .Annotations.description }}{{ end }}
          {{- if or .Labels.namespace .Labels.pod .Labels.instance }}
          🏷 {{ with .Labels.namespace }}ns={{ . }} {{ end }}{{ with .Labels.pod }}pod={{ . }} {{ end }}{{ with .Labels.instance }}instance={{ . }}{{ end }}{{ end }}
          {{ end }}

          {{ define "alert_list" }}
          {{- range $i, $alert := . }}
          {{- if lt $i 4 }}
          {{- template "alert_item" $alert }}
          {{- end }}
          {{- end }}
          {{- if gt (len .) 4 }}
          … and {{ len (slice . 4) }} more alert(s) in this group
          {{ end }}
          {{ end }}

          {{ define "alert_list_resolved" }}
          {{- range $i, $alert := . }}
          {{- if lt $i 5 }}
          • {{ $alert.Labels.alertname }}{{ with $alert.Labels.namespace }} ({{ . }}{{ with $alert.Labels.pod }}/{{ . }}{{ end }}){{ end }}
          {{- end }}
          {{- end }}
          {{- if gt (len .) 5 }}
          … and {{ len (slice . 5) }} more resolved
          {{ end }}
          {{ end }}

          {{ define "telegram.message" }}
          {{ if gt (len .Alerts.Firing) 0 }}
          🔥 Alerts Firing 🔥
          {{ template "alert_list" .Alerts.Firing }}
          {{ end }}
          {{ if gt (len .Alerts.Resolved) 0 }}
          ✅ Alerts Resolved ✅
          {{ template "alert_list_resolved" .Alerts.Resolved }}
          {{ end }}
          {{ end }}

      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ["alertname"]
          group_wait: 1m
          group_interval: 5m
          repeat_interval: 3h
          receiver: devnull
          routes:
            - receiver: blackhole
              matchers:
                - "severity=blackhole"
              continue: false
        receivers:
          - name: devnull
          - name: blackhole

    vmalert:
      enabled: true
      remoteWriteVMAgent: false
      # spec for VMAlert crd
      # https://github.com/VictoriaMetrics/operator/blob/master/docs/api.MD#vmalertspec
      spec:
        selectAllByDefault: true

        evaluationInterval: 15s
      ingress:
        enabled: false
    vmagent:
      enabled: true
      # https://docs.victoriametrics.com/operator/api.html#vmagentremotewritespec
      # defined spec will be added to the remoteWrite configuration of VMAgent
      # spec:
      #   inlineScrapeConfig: |
      #     - job_name: node-exporter
      #       honor_labels: true
      #       scrape_interval: 1m
      #       scrape_timeout: 10s
      #       metrics_path: /metrics
      #       scheme: http
      #       static_configs:
      #         - targets:
      #             - "10.5.0.32:9100"
        # selectAllByDefault: true
        # scrapeInterval: 25s
        # extraArgs:
        #   promscrape.streamParse: "true"
      ingress:
        enabled: false
