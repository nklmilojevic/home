---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vmetrics
  namespace: monitoring
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: victoriametrics
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    kubeControllerManager:
      enabled: true
      endpoints: []
      service:
        enabled: true
        port: 10257
        targetPort: 10257
        selector:
          component: kube-controller-manager
      vmScrape:
        spec:
          jobLabel: app.kubernetes.io/component
          namespaceSelector:
            matchNames:
              - kube-system
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true
                caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                serverName: kubernetes
    kubeScheduler:
      enabled: true
      endpoints: []
      service:
        enabled: true
        port: 10259
        targetPort: 10259
        selector:
          component: kube-scheduler
      vmScrape:
        spec:
          jobLabel: app.kubernetes.io/component
          namespaceSelector:
            matchNames:
              - kube-system
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true
                caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt

    kubeEtcd:
      enabled: true
      # Talos runs etcd as a host service (no pod to select), exposing metrics on
      # http://0.0.0.0:2381 via the etcd listen-metrics-urls machine-config patch.
      # Scrape the control-plane node IPs over plain HTTP instead of the default
      # pod selector + https on 2379 (which discovers 0 targets on Talos).
      endpoints:
        - 10.40.0.201
        - 10.40.0.202
        - 10.40.0.203
      service:
        enabled: true
        port: 2381
        targetPort: 2381
      vmScrape:
        spec:
          jobLabel: app.kubernetes.io/component
          endpoints:
            - port: http-metrics
              scheme: http

    grafana:
      enabled: false

    victoria-metrics-operator:
      enabled: true
      operator:
        disable_prometheus_converter: false
        enable_converter_ownership: true

    serviceAccount:
      create: true
      annotations: {}

    ## -- Create default rules for monitoring the cluster
    defaultRules:
      # NOTE: this chart's toggle is `enabled`, not `create` (which is silently ignored).
      enabled: true

      # -- Runbook url prefix for default rules
      runbookUrl: https://runbooks.prometheus-operator.dev/runbooks

      # -- Labels for default rules
      labels: {}
      # -- Annotations for default rules
      annotations: {}

      # Per-rule overrides (keyed by rule/record name).
      rules:
        # RecordingRulesNoData (vmalert source, info severity) fires for ANY
        # recording rule emitting 0 samples for 30m. On a small/idle cluster many
        # kube-prometheus rules are legitimately empty in the healthy state —
        # e.g. count:up0 = count(up == 0) is empty whenever nothing is down — so
        # this meta-alert is perpetual noise that can't tell "broken" from "fine".
        # Disable it instead of playing whack-a-mole per rule group (see below).
        RecordingRulesNoData:
          create: false
        # InfoInhibitor (severity=none) is designed to be routed to a null
        # receiver and used as an Alertmanager inhibit_rule source to suppress
        # info alerts. We have no inhibit_rules wired up, so it does nothing but
        # notify constantly. We drop all severity=info notifications at the route
        # (see alertmanager.config below), making this rule pure dead weight.
        InfoInhibitor:
          create: false
        # Talos mints ephemeral (<30m TTL) client certs, signed on the fly by
        # the cluster CA, for its internal apiserver operations during node
        # upgrades/reboots. Those drag the p01 expiry quantile below the rule's
        # thresholds for the duration of a rollout, firing warning+critical on
        # every Talos upgrade. A genuinely expiring cert (e.g. broken kubelet
        # cert rotation) presents continuously for days, so a longer `for`
        # still catches the real case while ignoring upgrade bursts.
        KubeClientCertificateExpiration:
          spec:
            for: 1h

      # kube-scheduler.rules are histogram-quantile recordings that yield 0 samples
      # whenever the cluster is idle (no pod scheduling), repeatedly tripping
      # RecordingRulesNoData. They only feed the kube-scheduler Grafana dashboard.
      groups:
        kubeScheduler:
          enabled: false

    alertmanager:
      enabled: true
      annotations: {}
      # spec for VMAlertmanager crd
      # https://github.com/VictoriaMetrics/operator/blob/master/docs/api.MD#vmalertmanagerspec
      spec:
        selectAllByDefault: true
        # Without this, the telegram VMAlertmanagerConfig route only matches
        # alerts labeled namespace=monitoring — everything else (kube-system,
        # flux-system, rook-ceph, ...) silently falls through to devnull.
        disableNamespaceMatcher: true
        externalURL: ""
        routePrefix: /
      ingress:
        enabled: false
      monzoTemplate:
        enabled: false

      templateFiles:
        telegram.tmpl: |-
          {{ define "alert_item" }}
          🪪 <b>{{ .Labels.alertname }}</b>
          {{- if eq .Labels.severity "critical" }}
          🚨 CRITICAL 🚨{{ end }}
          {{- if eq .Labels.severity "warning" }}
          ⚠️ WARNING ⚠️{{ end }}
          {{- if .Annotations.summary }}
          📝 {{ printf "%.200s" .Annotations.summary }}{{ end }}
          {{- if .Annotations.description }}
          📖 {{ printf "%.400s" .Annotations.description }}{{ end }}
          {{- if or .Labels.namespace .Labels.pod .Labels.instance }}
          🏷 {{ with .Labels.namespace }}ns={{ . }} {{ end }}{{ with .Labels.pod }}pod={{ . }} {{ end }}{{ with .Labels.instance }}instance={{ . }}{{ end }}{{ end }}
          {{ end }}

          {{ define "alert_list" }}
          {{- range $i, $alert := . }}
          {{- if lt $i 4 }}
          {{- template "alert_item" $alert }}
          {{- end }}
          {{- end }}
          {{- if gt (len .) 4 }}
          … and {{ len (slice . 4) }} more alert(s) in this group
          {{ end }}
          {{ end }}

          {{ define "alert_list_resolved" }}
          {{- range $i, $alert := . }}
          {{- if lt $i 5 }}
          • {{ $alert.Labels.alertname }}{{ with $alert.Labels.namespace }} ({{ . }}{{ with $alert.Labels.pod }}/{{ . }}{{ end }}){{ end }}
          {{- end }}
          {{- end }}
          {{- if gt (len .) 5 }}
          … and {{ len (slice . 5) }} more resolved
          {{ end }}
          {{ end }}

          {{ define "telegram.message" }}
          {{ if gt (len .Alerts.Firing) 0 }}
          🔥 Alerts Firing 🔥
          {{ template "alert_list" .Alerts.Firing }}
          {{ end }}
          {{ if gt (len .Alerts.Resolved) 0 }}
          ✅ Alerts Resolved ✅
          {{ template "alert_list_resolved" .Alerts.Resolved }}
          {{ end }}
          {{ end }}

      config:
        global:
          resolve_timeout: 5m
        route:
          group_by:
            - "alertname"
          group_wait: 1m
          group_interval: 5m
          repeat_interval: 3h
          receiver: devnull
          routes:
            # Drop all info-level alerts before they reach the telegram route.
            # info alerts are noise without warning/critical context, and the
            # kube-prometheus inhibition machinery that would normally suppress
            # them (InfoInhibitor + inhibit_rules) is not wired up here.
            - receiver: blackhole
              matchers:
                - "severity=info"
              continue: false
            - receiver: blackhole
              matchers:
                - "severity=blackhole"
              continue: false
            # Watchdog is a heartbeat (severity=none) — without this it would
            # reach the telegram route and repeat every 3h.
            - receiver: blackhole
              matchers:
                - "alertname=Watchdog"
              continue: false
        receivers:
          - name: devnull
          - name: blackhole

    vmalert:
      enabled: true
      remoteWriteVMAgent: false
      # spec for VMAlert crd
      # https://github.com/VictoriaMetrics/operator/blob/master/docs/api.MD#vmalertspec
      spec:
        selectAllByDefault: true

        evaluationInterval: 15s
      ingress:
        enabled: false
    vmsingle:
      # Chart default requests 500Mi but the working set sits at ~1.3-1.5Gi;
      # right-size so the scheduler accounts for what vmsingle actually uses.
      spec:
        resources:
          requests:
            cpu: 150m
            memory: 1536Mi
          limits:
            memory: 3Gi
    vmagent:
      enabled: true
      # https://docs.victoriametrics.com/operator/api.html#vmagentremotewritespec
      spec:
        # The busiest apiserver (icarus002) emits ~17.5MB of /metrics, over the
        # 16MiB default -promscrape.maxScrapeSize. vmagent aborts the scrape before
        # any relabeling runs (the size cap is checked while reading the raw
        # response body), so up{job="apiserver"}=0 for that instance and
        # KubeAPIInstanceUnreachable + TargetDown fire even though the API is
        # healthy. Raising the cap lets the scrape complete; the metricRelabel
        # drops below then trim stored cardinality (they don't reduce wire size).
        # NOTE: set via extraArgs, not a `maxScrapeSize` field — the VMAgent CRD
        # (operator v0.73.1) has no such field and the API server prunes it.
        extraArgs:
          promscrape.maxScrapeSize: "32MiB"
        # Chart default caps vmagent at 200m CPU, which it bursts past during
        # scrape/remote-write cycles (CPUThrottlingHigh, ~27% throttling). Raise
        # the limit so it stops getting throttled; request stays modest.
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 500m
            memory: 500Mi
        # Drop the volatile `pod` label from rook-ceph-mgr metrics. The mgr is a
        # singleton active daemon; when its pod restarts (same instance IP, new pod
        # name) the old series linger inside the [2d] lookback window and fork the
        # left side of CephPoolGrowth's `* on(...,instance) group_right()` join,
        # producing "duplicate time series" query errors (RequestErrorsToAPI /
        # TooManyLogs). Dropping `pod` collapses old+new into one series identity so
        # the rule self-heals across mgr restarts. Scoped via VM's `if` selector so
        # no other metrics are touched. No ceph dashboard/rule keys on this label.
        inlineRelabelConfig:
          - if: '{job="rook-ceph-mgr"}'
            action: labeldrop
            regex: pod
          # Drop high-cardinality apiserver/etcd histogram buckets that no rule or
          # dashboard here consumes. These families dominate the apiserver /metrics
          # payload (icarus002 was ~17.5MB); trimming them keeps stored series and
          # ingestion in check. request_duration (dashboards) and sli_duration (SLO
          # burn-rate rules) buckets are deliberately kept.
          - if: '{job="apiserver"}'
            action: drop
            source_labels: [__name__]
            regex: "etcd_request_duration_seconds_bucket|apiserver_request_body_size_bytes_bucket|apiserver_watch_list_duration_seconds_bucket|apiserver_response_sizes_bucket|apiserver_watch_cache_read_wait_seconds_bucket|apiserver_watch_events_sizes_bucket"
      ingress:
        enabled: false
