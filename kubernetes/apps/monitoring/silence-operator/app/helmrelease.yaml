---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: silence-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: silence-operator
      version: 0.0.8
      sourceRef:
        kind: HelmRepository
        name: silence-operator
  dependsOn:
    - name: vmetrics
      namespace: monitoring
    - name: silence-operator-crds
      namespace: monitoring
  values:
    image:
      name: quay.io/giantswarm/silence-operator
    operator:
      config:
        alertmanager:
          service:
            address: http://vmalertmanager-vmetrics-victoria-metrics-k8s-stack:9093
    rbac:
      create: true
    extraDeploy:
      - apiVersion: monitoring.giantswarm.io/v1alpha1
        kind: Silence
        metadata:
          name: ceph-node-nfsmount-diskspace-warning
          namespace: monitoring
        spec:
          matchers:
            - name: alertname
              value: CephNodeDiskspaceWarning
              isRegex: false
            - name: mountpoint
              value: /etc/nfsmount.conf
              isRegex: false
      - apiVersion: monitoring.giantswarm.io/v1alpha1
        kind: Silence
        metadata:
          name: ceph-node-local-diskspace-warning
          namespace: monitoring
        spec:
          matchers:
            - name: alertname
              value: CephNodeDiskspaceWarning
              isRegex: false
            - name: device
              value: /dev/sd.*
              isRegex: true
      # count:up0 counts DOWN scrape targets; when the cluster is healthy it
      # legitimately emits 0 samples, repeatedly tripping RecordingRulesNoData.
      - apiVersion: monitoring.giantswarm.io/v1alpha1
        kind: Silence
        metadata:
          name: recording-rules-no-data-count-up0
          namespace: monitoring
        spec:
          matchers:
            - name: alertname
              value: RecordingRulesNoData
              isRegex: false
            - name: recording
              value: count:up0
              isRegex: false
