---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: drm-exporter
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: drm-exporter
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Claim every GPU on the node read-only via DRA without consuming it, so the
    # exporter coexists with the workloads that hold the GPU (plex/jellyfin/scrypted).
    # adminAccess requires the namespace label resource.kubernetes.io/admin-access: "true".
    dra:
      enabled: true
      deviceClassName: gpu.intel.com
    securityContext:
      # Talos ships no msr kernel module, so SYS_RAWIO (Intel package temp via
      # /dev/cpu) is useless here; keep only PERFMON for i915 engine utilization.
      capabilities:
        add:
          - PERFMON
    monitoring:
      serviceMonitor:
        enabled: true
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            dashboards: grafana
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 128Mi
