---
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: grafana
spec:
  config:
    analytics:
      check_for_updates: "false"
      check_for_plugin_updates: "false"
      reporting_enabled: "false"
    auth.anonymous:
      enabled: "true"
      org_name: "Main Org."
      org_role: "Viewer"
    date_formats:
      use_browser_locale: "true"
    explore:
      enabled: "true"
    news:
      news_feed_enabled: "false"
    security:
      angular_support_enabled: "true"
    server:
      root_url: "https://grafana.nikola.wtf"
  deployment:
    spec:
      strategy:
        type: Recreate
      template:
        spec:
          containers:
            - name: grafana
              env:
                - name: GF_SECURITY_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-secret
                      key: admin-user
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-secret
                      key: admin-password
                - name: GF_INSTALL_PLUGINS
                  value: grafana-clock-panel,grafana-piechart-panel,grafana-worldmap-panel,victoriametrics-logs-datasource
  httpRoute:
    spec:
      hostnames:
        - grafana.nikola.wtf
      parentRefs:
        - name: internal
          namespace: kube-system
          sectionName: https
