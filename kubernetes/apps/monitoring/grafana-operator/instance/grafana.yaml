---
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: grafana
spec:
  config:
    analytics:
      check_for_updates: "false"
      check_for_plugin_updates: "false"
      reporting_enabled: "false"
    auth.anonymous:
      enabled: "true"
      org_name: "Main Org."
      org_role: "Viewer"
    date_formats:
      use_browser_locale: "true"
    explore:
      enabled: "true"
    news:
      news_feed_enabled: "false"
    plugins:
      # Grafana 12 preinstalls bundled app plugins and tries to auto-update them
      # into the read-only root filesystem (fails for elasticsearch). We install
      # what we need via GF_INSTALL_PLUGINS instead.
      preinstall_disabled: "true"
    server:
      root_url: "https://grafana.nikola.wtf"
  deployment:
    spec:
      strategy:
        type: Recreate
      template:
        spec:
          securityContext:
            fsGroup: 10001
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: grafana
              env:
                - name: GF_SECURITY_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-secret
                      key: admin-user
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-secret
                      key: admin-password
                - name: GF_INSTALL_PLUGINS
                  value: grafana-clock-panel,victoriametrics-logs-datasource
          volumes:
            - name: grafana-data
              persistentVolumeClaim:
                claimName: grafana-pvc
  persistentVolumeClaim:
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
      storageClassName: ceph-block
  httpRoute:
    spec:
      hostnames:
        - grafana.nikola.wtf
      parentRefs:
        - name: internal
          namespace: kube-system
          sectionName: https
