apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cloudflared
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
  resyncPeriod: 24h
  # renovate: dashboardName="Cloudflare Tunnels (cloudflared)"
  grafanaCom:
    id: 17457
    revision: 6
