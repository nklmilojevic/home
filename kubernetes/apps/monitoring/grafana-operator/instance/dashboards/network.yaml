  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
  # renovate: dashboardName="Envoy Proxy Global"
  grafanaCom:
    id: 24459
    revision: 3
