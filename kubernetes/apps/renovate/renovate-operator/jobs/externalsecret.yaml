---
# The GitHub App private key (PEM) pulled from 1Password, consumed by the
# GithubAccessToken generator above.
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-github-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: renovate-github-app
    creationPolicy: Owner
  data:
    - secretKey: private-key
      remoteRef:
        key: renovate
        property: bot_app_private_key
---
# Renders the freshly-minted installation token into renovate-secret. The 30m
# refresh keeps the token (1h TTL) valid before each hourly RenovateJob run.
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate
spec:
  refreshInterval: 30m
  target:
    name: renovate-secret
    creationPolicy: Owner
    template:
      data:
        RENOVATE_TOKEN: "{{ .token }}"
        GITHUB_COM_TOKEN: "{{ .token }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: GithubAccessToken
          name: renovate
