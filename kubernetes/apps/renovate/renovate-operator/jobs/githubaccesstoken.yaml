---
# Mints a short-lived (~1h) GitHub App installation token, the in-cluster
# equivalent of actions/create-github-app-token. Reuses your existing Renovate
# GitHub App. appID / installID are NOT secret; fill them in below.
apiVersion: generators.external-secrets.io/v1alpha1
kind: GithubAccessToken
metadata:
  name: renovate
spec:
  appID: "1092196"
  installID: "59325396"
  repositories:
    - home
  permissions:
    contents: write
    pull_requests: write
    issues: write
    workflows: write
  auth:
    privateKey:
      secretRef:
        name: renovate-github-app
        key: private-key
