---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
  namespace: flux-system
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: konflate
  values:
    config:
      repo: github://nklmilojevic/home
      # statusChecks needs "Checks: R/W" on the App; flip to false to run
      # comments-only with the Renovate App's existing permissions.
      statusChecks: true
      prComments: true
      publicUrl: https://{{ .Release.Name }}.nikola.wtf
      mcp: true
    secret:
      existingSecret: konflate-secret
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/endpoint: |-
          conditions: ["[STATUS] == 200"]
      parentRefs:
        - name: external
          namespace: network
          sectionName: https
      hostnames:
        - "{{ .Release.Name }}.nikola.wtf"
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 100m
      limits:
        memory: 1Gi
