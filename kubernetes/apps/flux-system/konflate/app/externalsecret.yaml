---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: konflate
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: konflate-secret
    creationPolicy: Owner
    template:
      data:
        # client id + webhook secret from the dedicated `konflate` item;
        # private key reused from the existing Renovate App `renovate` item.
        # konflate uses the App *client id* (not appID/installID) and
        # auto-detects the installation.
        KONFLATE_APP_CLIENT_ID: "{{ .client_id }}"
        KONFLATE_APP_PRIVATE_KEY: "{{ .bot_app_private_key }}"
        KONFLATE_WEBHOOK_SECRET: "{{ .webhook_secret }}"
  dataFrom:
    - extract:
        key: renovate
    - extract:
        key: konflate
