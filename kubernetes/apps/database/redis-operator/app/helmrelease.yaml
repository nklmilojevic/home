---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ot-operator
  labels:
    flux.home/helm-defaults: skip
spec:
  interval: 1h
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: ot-operator
  install:
    crds: CreateReplace
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 5
  values:
    manager:
      config:
        kubeClientTimeout: ""
    resources:
      requests:
        cpu: 20m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
