---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
  dependsOn:
    - name: envoy-gateway-crds
  values:
    # CRDs come from the envoy-gateway-crds HelmRelease (Envoy Gateway's own)
    # and the gateway-api Kustomization (Gateway API experimental channel)
    crds:
      enabled: false
    global:
      imageRegistry: mirror.gcr.io
    config:
      envoyGateway:
        provider:
          type: Kubernetes
          kubernetes:
            deploy:
              type: GatewayNamespace
