---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/operator.victoriametrics.com/vmservicescrape_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: unifi-dns-metrics
spec:
  jobLabel: app.kubernetes.io/instance
  selector:
    matchLabels:
      app.kubernetes.io/instance: unifi-dns
      app.kubernetes.io/name: external-dns
  # Only scrape the external-dns metrics port. The webhook port (http-webhook)
  # emits an unbounded, per-record-UUID histogram that exceeds maxScrapeSize.
  endpoints:
    - port: http
      path: /metrics
