---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app unifi-dns
  labels:
    flux.home/helm-defaults: skip
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: unifi-dns
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    fullnameOverride: *app
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/home-operations/external-dns-unifi-webhook
          tag: 0.10.7@sha256:0253db1ccaa6e6f912963dbb885bb33a88c102ccc7e904ab76768bd399ab9f56
        env:
          - name: UNIFI_HOST
            value: https://10.5.0.1
          - name: UNIFI_API_KEY
            valueFrom:
              secretKeyRef:
                name: &secret unifi-dns-secret
                key: UNIFI_API_KEY
        livenessProbe:
          httpGet:
            path: /healthz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
    triggerLoopOnEvent: true
    policy: sync
    sources:
      - "gateway-httproute"
      - "service"
    txtOwnerId: main
    txtPrefix: k8s.main.
    domainFilters:
      - "nikola.wtf"
    # The webhook sidecar (port 8080) exposes an unbounded
    # `external_dns_http_request_duration_seconds` histogram labelled by the
    # UniFi record UUID (`path`), which grows past vmagent's 16MB maxScrapeSize
    # and breaks scraping. Disable the chart ServiceMonitor (it scrapes both
    # ports) and use a dedicated VMServiceScrape that only hits the healthy
    # external-dns metrics port (7979).
    serviceMonitor:
      enabled: false
    podAnnotations:
      secret.reloader.stakater.com/reload: *secret
