---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflared
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: cloudflared-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        TUNNEL_ID: "{{ .TUNNEL_ID }}"
        # credentials_json is stored base64-encoded in 1Password (op CLI mangles
        # multiline JSON), so decode it back to the raw tunnel credentials file.
        credentials.json: "{{ .credentials_json | b64dec }}"
  dataFrom:
    - extract:
        key: cloudflared-tunnel
