---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llmkube
  namespace: ai
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: llmkube
  values:
    namespace: ai
    crds:
      install: true
      keep: true
    controllerManager:
      replicaCount: 1
      leaderElection:
        enabled: false
      resources:
        requests:
          cpu: 10m
          memory: 78Mi
        limits:
          memory: 128Mi
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
    metrics:
      enabled: false
    prometheus:
      serviceMonitor:
        enabled: false
      inferencePodMonitor:
        enabled: false
      prometheusRule:
        enabled: false
    modelCache:
      enabled: true
      # perService: each InferenceService gets its own node-local cache that
      # binds where its pod lands (openebs-hostpath is WaitForFirstConsumer).
      mode: perService
      size: 20Gi
      storageClass: openebs-hostpath
      accessMode: ReadWriteOnce
      mountPath: /models
