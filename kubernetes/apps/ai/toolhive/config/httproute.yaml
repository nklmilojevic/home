---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-gateway
  annotations:
    # The MCP endpoint returns 406 to a plain GET (it only speaks the MCP POST
    # handshake), so treat any non-5xx response as up; a real outage is 5xx/timeout.
    gatus.home-operations.com/endpoint: |
      conditions:
        - "[STATUS] < 500"
spec:
  hostnames:
    - mcp.nikola.wtf
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: vmcp-mcp-gateway-internal
          port: 4483
