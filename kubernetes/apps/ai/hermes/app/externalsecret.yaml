---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: hermes-secret
    creationPolicy: Owner
  data:
    # Telegram platform (bot enabled by the presence of the token env var).
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: hermes
        property: telegram_bot_token
    - secretKey: TELEGRAM_ALLOWED_USERS
      remoteRef:
        key: hermes
        property: telegram_allowed_users
    # Dashboard built-in username/password auth provider. A non-loopback
    # dashboard fails closed at startup without an auth provider configured.
    - secretKey: HERMES_DASHBOARD_BASIC_AUTH_USERNAME
      remoteRef:
        key: hermes
        property: dashboard_username
    - secretKey: HERMES_DASHBOARD_BASIC_AUTH_PASSWORD
      remoteRef:
        key: hermes
        property: dashboard_password
    - secretKey: HERMES_DASHBOARD_BASIC_AUTH_SECRET
      remoteRef:
        key: hermes
        property: dashboard_secret
    # API server auth key (required once API_SERVER_ENABLED=true)
    - secretKey: API_SERVER_KEY
      remoteRef:
        key: hermes
        property: api_server_key
    # memini API key (shared with the memini service; same 1Password item)
    - secretKey: MEMINI_API_KEY
      remoteRef:
        key: memini
        property: api_key
    # Firecrawl API key — backs web_extract (search runs on self-hosted SearXNG).
    - secretKey: FIRECRAWL_API_KEY
      remoteRef:
        key: hermes
        property: firecrawl_api_key
