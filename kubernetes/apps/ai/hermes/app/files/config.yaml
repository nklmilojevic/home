---
# Pinned Hermes config. On every start an init container merges this file OVER
# /opt/data/config.yaml (this file wins on conflicting keys), so the values below
# stay enforced while anything you set interactively with `hermes model`
# (e.g. model.default) is preserved on the PVC.
model:
  # OpenAI Codex — authenticates via device-code OAuth using your ChatGPT/Codex
  # subscription. There is NO API key. Complete a one-time OAuth login from a
  # headless pod (writes /opt/data/auth.json on the VolSync PVC, then auto-refreshes):
  #   kubectl exec -n ai deploy/hermes -it -- hermes auth add openai-codex --type oauth --no-browser --manual-paste
  #   kubectl exec -n ai deploy/hermes -it -- hermes model   # pick OpenAI Codex, set default model
  #
  # Local-LLM trial (2026-07): LM Studio on the Windows PC (10.50.0.81, RTX 5080),
  # reached via LM_BASE_URL in the HelmRelease env. Also loaded there:
  # google/gemma-4-26b-a4b and google/gemma-4-e4b — switch with `hermes model`
  # (reverts to the pinned default on pod restart). To go back to hosted:
  # provider: opencode-go, default: minimax-m3.
  provider: lmstudio
  default: openai/gpt-oss-20b

toolsets:
  - hermes-cli

# Web tools (web_search / web_extract, already in the hermes-cli/-telegram
# toolsets). Search runs on the self-hosted SearXNG instance (free, no key,
# SEARXNG_URL from env); extract runs on Firecrawl (FIRECRAWL_API_KEY from env),
# since SearXNG is search-only.
web:
  search_backend: "searxng"
  extract_backend: "firecrawl"

compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20

security:
  redact_secrets: true

privacy:
  redact_pii: true

# Persistent semantic memory via memini (installed as a memory provider by the
# install-memini-plugin init container; MEMINI_BASE_URL/MEMINI_API_KEY from env).
memory:
  provider: memini

dashboard:
  # Declared explicitly so OAuth-less redirect_uri reconstruction is correct
  # behind the internal Envoy gateway.
  public_url: https://hermes.nikola.wtf
