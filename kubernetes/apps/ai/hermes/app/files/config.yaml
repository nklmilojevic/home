---
# Pinned Hermes config. On every start an init container merges this file OVER
# /opt/data/config.yaml (this file wins on conflicting keys), so the values below
# stay enforced while anything you set interactively with `hermes model`
# (e.g. model.default) is preserved on the PVC.
model:
  # OpenAI Codex — authenticates via device-code OAuth using your ChatGPT/Codex
  # subscription. There is NO API key. Complete a one-time login (writes
  # /opt/data/auth.json on the VolSync PVC, then auto-refreshes):
  #   kubectl exec -n ai deploy/hermes -c dashboard -it -- hermes auth add codex-oauth
  #   kubectl exec -n ai deploy/hermes -c dashboard -it -- hermes model   # pick OpenAI Codex, set default model
  provider: openai-codex

toolsets:
  - hermes-cli

compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20

security:
  redact_secrets: true

privacy:
  redact_pii: true

dashboard:
  # Declared explicitly so OAuth-less redirect_uri reconstruction is correct
  # behind the internal Envoy gateway.
  public_url: https://hermes.nikola.wtf
