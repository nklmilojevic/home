---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
  namespace: ai
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: hermes
  values:
    controllers:
      hermes:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          # readOnlyRootFilesystem needs /run to be writable and owned by the app uid
          fix-run:
            image:
              repository: docker.io/library/busybox
              tag: latest
            command: ["sh", "-c", "chown 10000:10000 /run && chmod 755 /run"]
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
          # Merge the pinned config over the copy on the PVC (pinned keys win, user edits preserved)
          init:
            image:
              repository: docker.io/mikefarah/yq
              tag: "4"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                if [ -f /opt/data/config.yaml ]; then
                  yq eval-all 'select(fileIndex == 0) * select(fileIndex == 1)' \
                    /opt/data/config.yaml /config/config.yaml > /tmp/merged.yaml
                  mv /tmp/merged.yaml /opt/data/config.yaml
                else
                  cp /config/config.yaml /opt/data/config.yaml
                fi
          # Install gh, Go and Homebrew onto the PVC so the agent can build/install
          # tools at runtime. Idempotent — only downloads on first boot, reused after.
          install-tools:
            image:
              repository: nousresearch/hermes-agent
              tag: &imageTag v2026.7.1@sha256:b6c019227889e6675424a2b6223b2cafdd36bf7d1048d1ddd8e043b880d6cc0f
            command:
              - /bin/sh
              - -c
              - |
                set -e
                mkdir -p /opt/data/.local/bin /opt/data/.local/go

                if [ ! -f /opt/data/.local/bin/gh ]; then
                  cd /tmp
                  curl -fsSL https://github.com/cli/cli/releases/download/v2.61.0/gh_2.61.0_linux_amd64.tar.gz -o gh.tar.gz
                  tar xzf gh.tar.gz
                  cp gh_2.61.0_linux_amd64/bin/gh /opt/data/.local/bin/
                  rm -rf gh.tar.gz gh_2.61.0_linux_amd64
                fi

                if [ ! -f /opt/data/.local/go/bin/go ]; then
                  cd /tmp
                  curl -fsSL https://go.dev/dl/go1.23.5.linux-amd64.tar.gz -o go.tar.gz
                  tar xzf go.tar.gz
                  mv go /opt/data/.local/
                  rm -rf go.tar.gz
                fi

                if [ ! -f /opt/data/.local/homebrew/bin/brew ]; then
                  git clone --depth 1 https://github.com/Homebrew/brew /opt/data/.local/homebrew
                fi
        containers:
          # Supervised mode, single container. The image's s6 /init runs the
          # profile reconciler (which starts the supervised gateway), plus the
          # dashboard service (HERMES_DASHBOARD=true). The container's CMD runs
          # as /init's main program — so it must be a long-lived keepalive, NOT
          # a gateway/dashboard subcommand (those collide with the supervised
          # services and make s6 tear the container down). `sleep infinity` is a
          # supported invocation. API_SERVER_ENABLED exposes /health for probes.
          app:
            image:
              repository: nousresearch/hermes-agent
              # Pinned by digest to match the community-tested builds and avoid
              # the floating-tag drift that changed API-server behaviour on us.
              tag: *imageTag
            # args (CMD), NOT command (ENTRYPOINT) — the image ENTRYPOINT is the
            # s6 /init supervisor and must run; we only replace its main program.
            args: ["sleep", "infinity"]
            envFrom:
              - secretRef:
                  name: hermes-secret
            env:
              HERMES_HOME: /opt/data
              HOME: /opt/data
              TZ: "Europe/Belgrade"
              HERMES_DASHBOARD: "true"
              API_SERVER_ENABLED: "true"
              API_SERVER_HOST: 0.0.0.0
              API_SERVER_PORT: &api-port 8642
              # API_SERVER_KEY arrives via envFrom (hermes-secret)
              # Tools installed onto the PVC by the install-tools init container
              PATH: /opt/hermes/bin:/opt/hermes/.venv/bin:/opt/data/.local/bin:/opt/data/.local/go/bin:/opt/data/.local/homebrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              GOPATH: /opt/data/go
              HOMEBREW_PREFIX: /opt/data/.local/homebrew
              HOMEBREW_CELLAR: /opt/data/.local/homebrew/Cellar
              HOMEBREW_REPOSITORY: /opt/data/.local/homebrew
              PIP_BREAK_SYSTEM_PACKAGES: "1"
              # Persistent memory backend (memini). MEMINI_API_KEY via envFrom.
              MEMINI_URL: http://memini.ai.svc.cluster.local:8080
              MEMINI_NAMESPACE: hermes
            probes:
              # TCP, not httpGet /health — the API server requires the key and may
              # reject unauthenticated GETs; a bound port proves the gateway is up.
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *api-port
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *probe
              startup:
                enabled: false
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              # s6/cont-init writes to the root fs during startup; the proven
              # community configs all run with this false.
              readOnlyRootFilesystem: false
              capabilities:
                add:
                  - CHOWN
                drop:
                  - ALL
    defaultPodOptions:
      terminationGracePeriodSeconds: 600
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: hermes
        ports:
          http:
            port: &gateway-port 8642
      dashboard:
        controller: hermes
        ports:
          http:
            port: &dashboard-port 9119
    route:
      dashboard:
        hostnames:
          - hermes.nikola.wtf
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: dashboard
                port: http
    persistence:
      data:
        existingClaim: hermes
        globalMounts:
          - path: /opt/data
      config:
        type: configMap
        name: hermes-config
        globalMounts:
          - path: /config
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      run:
        type: emptyDir
        globalMounts:
          - path: /run
