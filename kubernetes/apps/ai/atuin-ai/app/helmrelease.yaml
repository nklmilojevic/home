---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: atuin-ai
  namespace: ai
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: atuin-ai
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      atuin-ai:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/atuinsh/atuin-ai-server
              tag: latest@sha256:ab059f33830d2441986833475c4b295b886e2c8e911a87642f51435856611ac4
            env:
              TZ: "Europe/Belgrade"
              CHAT_CONFIG: /etc/atuin-ai/config.toml
              # Elixir release needs a writable tmp; root fs is read-only
              RELEASE_TMP: /tmp
              CHAT_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: atuin-ai-secret
                    key: CHAT_API_KEY
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: atuin-ai
        ports:
          http:
            port: &port 8080
    route:
      app:
        hostnames:
          - atuin-ai.nikola.wtf
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: atuin-ai
                port: *port
    persistence:
      config-file:
        type: configMap
        name: atuin-ai-configmap
        globalMounts:
          - path: /etc/atuin-ai/config.toml
            subPath: config.toml
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
