---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
  namespace: media
spec:
  interval: 5m
  # renovate: registryUrl=http://bjw-s.github.io/helm-charts/
  chartRef:
    kind: OCIRepository
    name: plex
  values:
    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: plex

    controllers:
      plex:
        replicas: 1

        containers:
          app:
            image:
              repository: quay.io/nklmilojevic/plex
              tag: 1.43.3.10828@sha256:f7487449bd22fbfd444031fb73182819e74e9fea8932f7eb0b68879df5cce025
            env:
              TZ: "Europe/Belgrade"
              VERSION: "docker"
              PLEX_ADVERTISE_URL: https://10.40.0.6:32400,https://plex.nikola.wtf:443
              PLEX_NO_AUTH_NETWORKS: 10.0.0.0/8
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 200m
                memory: 256Mi
              limits:
                memory: 3Gi

        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups:
              - 44
              - 105
              - 100
              - 109

    service:
      app:
        controller: plex
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        annotations:
          lbipam.cilium.io/ips: "10.40.0.6"
        ports:
          http:
            port: &port 32400

    route:
      app:
        annotations:
          # Plex returns 401 on / (auth-gated); probe the unauthenticated /identity instead.
          gatus.home-operations.com/endpoint: |
            url: https://plex.nikola.wtf/identity
        hostnames:
          - "{{ .Release.Name }}.nikola.wtf"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: plex
                port: *port

    persistence:
      config:
        existingClaim: "{{ .Release.Name }}-config"
      transcode:
        type: emptyDir
        medium: Memory
      media:
        enabled: true
        type: custom
        volumeSpec:
          nfs:
            server: "10.5.0.10"
            path: "/var/nfs/shared/media"
        globalMounts:
          - path: "/media"
