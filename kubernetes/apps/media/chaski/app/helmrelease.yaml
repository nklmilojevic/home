---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: chaski
  namespace: media
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: chaski
  values:
    replicaCount: 1
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    env:
      TZ: "Europe/Belgrade"
    envFrom:
      - secretRef:
          name: chaski-secret
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 128Mi
    monitoring:
      serviceMonitor:
        enabled: true
    config:
      logLevel: info
      targets:
        telegram:
          apprise:
            # apprise-go accepts "tgram://{botID}/{tokenHash}/{chatID}": only the numeric
            # bot ID sits in the host, so split the token's ":" into a "/" path separator.
            # ?preview=true enables Telegram web-page previews (apprise-go disables them by default).
            url: tgram://{{ env "TELEGRAM_BOT_TOKEN" | replace ":" "/" }}/{{ env "TELEGRAM_CHAT_ID" }}?preview=true
      routes:
        # POST target for Radarr:  http://chaski.media.svc.cluster.local:8080/hooks/radarr
        # eventTypes: Grab, Download (import), Download+isUpgrade, Rename, MovieAdded, ManualInteractionRequired
        radarr:
          target: telegram
          whenExpr: payload.eventType in ["Grab", "Download", "Rename", "MovieAdded", "ManualInteractionRequired"]
          params:
            format: html
          title: >-
            {{- if eq .payload.eventType "ManualInteractionRequired" -}}
            ⚠️ Radarr — Manual Interaction Required
            {{- else if eq .payload.eventType "Grab" -}}
            ⬇️ Movie Grabbed
            {{- else if eq .payload.eventType "Rename" -}}
            🏷️ Movie Renamed
            {{- else if eq .payload.eventType "MovieAdded" -}}
            ➕ Movie Added to Library
            {{- else if .payload.isUpgrade -}}
            ⬆️ Movie Upgraded
            {{- else -}}
            ✅ Movie Imported
            {{- end -}}
          message: |-
            <b>{{ .payload.movie.title }} ({{ .payload.movie.year }})</b>{{ with .payload.movie.overview }}
            {{ . }}{{ end }}{{ with .payload.downloadClient }}
            <b>Client:</b> {{ . }}{{ end }}{{ with .payload.movie.imdbId }}
            https://www.imdb.com/title/{{ . }}/{{ end }}{{ with .payload.applicationUrl }}
            <a href="{{ . }}/movie/{{ $.payload.movie.tmdbId }}">Open in Radarr</a>{{ end }}
        # POST target for Sonarr:  http://chaski.media.svc.cluster.local:8080/hooks/sonarr
        # eventTypes: Grab, Download (import), Download+isUpgrade, Rename, SeriesAdd, ManualInteractionRequired
        sonarr:
          target: telegram
          whenExpr: payload.eventType in ["Grab", "Download", "Rename", "SeriesAdd", "ManualInteractionRequired"]
          params:
            format: html
          title: >-
            {{- if eq .payload.eventType "ManualInteractionRequired" -}}
            ⚠️ Sonarr — Manual Interaction Required
            {{- else if eq .payload.eventType "Grab" -}}
            ⬇️ Episode Grabbed
            {{- else if eq .payload.eventType "Rename" -}}
            🏷️ Series Renamed
            {{- else if eq .payload.eventType "SeriesAdd" -}}
            ➕ Series Added to Library
            {{- else if .payload.isUpgrade -}}
            ⬆️ Episode Upgraded
            {{- else -}}
            ✅ Episode Imported
            {{- end -}}
          message: |-
            <b>{{ .payload.series.title }}{{ with .payload.episodes }} — {{ if eq (len .) 1 }}{{ printf "S%02dE%02d" (toInt (index . 0).seasonNumber) (toInt (index . 0).episodeNumber) }}{{ else }}{{ len . }} episodes{{ end }}{{ end }}</b>{{ with .payload.episodes }}{{ if eq (len .) 1 }}
            {{ (index . 0).title }}{{ end }}{{ end }}{{ with .payload.downloadClient }}
            <b>Client:</b> {{ . }}{{ end }}{{ with .payload.series.imdbId }}
            https://www.imdb.com/title/{{ . }}/{{ end }}{{ with .payload.applicationUrl }}
            <a href="{{ . }}/series/{{ $.payload.series.titleSlug }}">Open in Sonarr</a>{{ end }}
