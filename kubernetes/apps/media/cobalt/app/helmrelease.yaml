---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cobalt
  namespace: media
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: cobalt
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      cobalt:
        containers:
          app:
            image:
              repository: ghcr.io/imputnet/cobalt
              tag: 11.7.1
            env:
              TZ: "Europe/Belgrade"
              API_URL: "https://cobalt-api.nikola.wtf/"
              API_PORT: &port 9000
              CORS_WILDCARD: "0"
              CORS_URL: "https://cobalt.nikola.wtf"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: cobalt
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - cobalt-api.nikola.wtf
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
