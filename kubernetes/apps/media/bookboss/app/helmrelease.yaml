---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bookboss
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: bookboss
  values:
    controllers:
      bookboss:
        annotations:
          secret.reloader.stakater.com/reload: bookboss-secret
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/szinn/bookboss
              tag: v0.8.31
            env:
              TZ: "Europe/Belgrade"
              BOOKBOSS__DATABASE__DATABASE_URL: sqlite:///data/bookboss.db?mode=rwc
              BOOKBOSS__FRONTEND__BASE_URL: https://bookboss.nikola.wtf
              BOOKBOSS__FRONTEND__LISTEN_PORT: &port 8080
              BOOKBOSS__LIBRARY__LIBRARY_PATH: /library/books
              BOOKBOSS__IMPORT__BOOKDROP_PATH: /library/bookdrop
              BOOKBOSS__IMPORT__POLL_INTERVAL_SECS: 60
              BOOKBOSS__IMPORT__WORKER_POLL_INTERVAL_SECS: 5
            envFrom:
              - secretRef:
                  name: bookboss-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: bookboss
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.nikola.wtf"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      config:
        existingClaim: bookboss
        globalMounts:
          - path: /data
      media:
        type: custom
        volumeSpec:
          nfs:
            server: "10.5.0.10"
            path: "/var/nfs/shared/media"
        advancedMounts:
          bookboss:
            app:
              - path: /library/books
                subPath: books/library
              - path: /library/bookdrop
                subPath: books/bookdrop
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
