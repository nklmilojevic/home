---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-gpu-resource-driver
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: intel-gpu-resource-driver
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Match Talos containerd CDI spec directories (/var/run -> /run).
    cdi:
      staticPath: /run/cdi
      dynamicPath: /run/cdi
    kubeletPlugin:
      # Discover GPU details (memory, etc.) directly from hardware instead of via
      # xpumd, so health monitoring (which requires xpumd) can stay disabled.
      privileged: true
      healthMonitoring:
        enabled: false
