---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mosquitto
  namespace: home
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: mosquitto
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      mosquitto:
        annotations:
          configmap.reloader.stakater.com/reload: "mosqutto-config"
        containers:
          app:
            image:
              repository: eclipse-mosquitto
              tag: 2.0.22
            env:
              TZ: "Europe/Belgrade"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 100Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    service:
      app:
        controller: mosquitto
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "10.40.0.8"
          external-dns.alpha.kubernetes.io/hostname: mqtt.nikola.wtf
        ports:
          http:
            port: 1883

    configMaps:
      config:
        data:
          mosquitto.conf: |
            allow_anonymous true
            autosave_interval 60
            connection_messages false
            listener 1883
            per_listener_settings false
            persistence true
            persistence_location /data

    persistence:
      data:
        existingClaim: mosquitto-data
      config-file:
        type: configMap
        name: mosquitto
        advancedMounts:
          mosquitto:
            app:
              - path: /mosquitto/config/mosquitto.conf
                subPath: mosquitto.conf
