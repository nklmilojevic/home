---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-tunnel-id-secret
  # flux-system because postBuild.substituteFrom reads from the Kustomization's
  # own namespace, and all Flux Kustomizations live in flux-system.
  namespace: flux-system
stringData:
  CLOUDFLARE_TUNNEL_ID: |-
    ref+op://homecluster/cloudflared-tunnel/TUNNEL_ID
