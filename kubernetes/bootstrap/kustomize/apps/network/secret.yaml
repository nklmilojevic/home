---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-tunnel-id-secret
  # network because the cloudflared Kustomization now lives in the network
  # namespace, and postBuild.substituteFrom reads from the Kustomization's ns.
  namespace: network
stringData:
  CLOUDFLARE_TUNNEL_ID: |-
    ref+op://homecluster/cloudflared-tunnel/TUNNEL_ID
