---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps
  namespace: flux-system
spec:
  interval: 30m
  path: ./kubernetes/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  patches:
    # Inject standard HelmRelease install/upgrade remediation defaults into every
    # app Kustomization, so individual HelmReleases no longer repeat the boilerplate.
    # A HelmRelease that needs different remediation behaviour opts out by carrying
    # the label `flux.home/helm-defaults: skip` (the inner patch skips it).
    - target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: not-used
        spec:
          patches:
            - target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease
                labelSelector: "!flux.home/helm-defaults"
              patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: not-used
                spec:
                  install:
                    remediation:
                      retries: 3
                  upgrade:
                    cleanupOnFail: true
                    remediation:
                      strategy: rollback
                      retries: 3
