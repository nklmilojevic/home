---
# Shared DRA claim for the Intel iGPU (DeviceClass gpu.intel.com, via
# intel-gpu-resource-driver). adminAccess: true + allocationMode: All lets
# multiple pods multiplex the single iGPU (the device has no
# allowMultipleAllocations, so a normal exclusive claim would block sharing).
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: ${APP}-gpu
spec:
  spec:
    devices:
      requests:
        - name: gpu
          exactly:
            deviceClassName: gpu.intel.com
            adminAccess: true
            allocationMode: All
