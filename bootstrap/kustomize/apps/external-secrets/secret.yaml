---
# 1Password Connect credentials, injected once at bootstrap via vals (ref+op://)
# resolved with OP_SERVICE_ACCOUNT_TOKEN. NOT managed by Flux — this is the
# chicken-and-egg secret external-secrets needs before it can talk to 1Password.
apiVersion: v1
kind: Secret
metadata:
  name: op-credentials
  namespace: security
stringData:
  1password-credentials.json: |-
    ref+op://homecluster/onepassword-connect/credentials_json
  token: |-
    ref+op://homecluster/onepassword-connect/token
